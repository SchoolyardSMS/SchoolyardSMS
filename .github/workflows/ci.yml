name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for tsc)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install dependencies (bun)
        run: bun install

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Run tests (vitest)
        run: bun run test -- --run --reporter verbose

      - name: Lint
        run: bun run lint --silent
